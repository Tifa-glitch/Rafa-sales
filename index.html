<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>拉法業績追蹤 | 5-6月</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; background: #F4F3EE; min-height: 100vh; padding: 0 0 32px; }

  .header { background: #C62828; padding: 18px 16px 14px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.02em; }
  .update-badge { font-size: 12px; color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.18); border-radius: 6px; padding: 4px 10px; }

  .tabs { display: flex; gap: 6px; }
  .tab { flex: 1; text-align: center; font-size: 14px; font-weight: 500; padding: 9px 0; border-radius: 8px; cursor: pointer; border: none; transition: background 0.18s, color 0.18s; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); }
  .tab.active { background: #fff; color: #C62828; font-weight: 700; }

  .content { padding: 14px 12px 0; }

  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .s-card { background: #fff; border-radius: 14px; padding: 14px 14px 12px; border: 0.5px solid rgba(0,0,0,0.07); }
  .s-lbl { font-size: 12px; color: #888; margin-bottom: 6px; }
  .s-val { font-size: 26px; font-weight: 700; line-height: 1; }
  .s-sub { font-size: 12px; margin-top: 5px; color: #999; }

  .c-green { color: #2E7D32; }
  .c-red { color: #C62828; }
  .c-orange { color: #E65100; }

  .legend { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .progress-info { background: #fff5f5; border-left: 3px solid #C62828; border-radius: 0 8px 8px 0; padding: 9px 12px; margin-bottom: 14px; font-size: 12px; color: #7f1010; line-height: 1.6; }

  .sec-hdr { font-size: 13px; font-weight: 600; color: #555; letter-spacing: 0.04em; margin-bottom: 10px; padding-left: 4px; }

  .region-divider { font-size: 11px; font-weight: 700; color: #C62828; letter-spacing: 0.08em; padding: 10px 4px 6px; border-bottom: 1.5px solid #C62828; margin-bottom: 10px; }

  .p-card { background: #fff; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border: 0.5px solid rgba(0,0,0,0.07); }
  .p-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .p-name { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .p-region-tag { font-size: 11px; color: #aaa; margin-top: 2px; }

  .pill { font-size: 12px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }
  .pill-ok { background: #E8F5E9; color: #1B5E20; }
  .pill-warn { background: #FFF3E0; color: #BF360C; }
  .pill-bad { background: #FFEBEE; color: #B71C1C; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 12px; }
  .m-box { background: #FAF9F6; border-radius: 10px; padding: 10px 6px 8px; text-align: center; }
  .m-num { font-size: 17px; font-weight: 700; line-height: 1; }
  .m-lbl { font-size: 10px; color: #999; margin-top: 5px; line-height: 1.4; }

  .prog-section { border-top: 0.5px solid #f0f0f0; padding-top: 10px; }
  .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .prog-label { font-size: 12px; color: #666; }
  .prog-pct { font-size: 13px; font-weight: 700; }
  .bar-bg { height: 7px; background: #EEEDE8; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }

  .num-ok { color: #2E7D32; }
  .num-warn { color: #E65100; }
  .num-bad { color: #C62828; }

  .note-box { background: #FFF8F8; border-left: 3px solid #C62828; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 14px; font-size: 12px; color: #7f1010; line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">🏢 拉法業績追蹤</div>
    <div class="update-badge">截至 5/31</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setView('all',this)">全員總覽</button>
    <button class="tab" onclick="setView('chain',this)">連鎖通路</button>
    <button class="tab" onclick="setView('trad',this)">傳統通路</button>
  </div>
</div>

<div class="content">
  <div class="note-box">
    📌 5/31 已完成雙月期 50% 時間進度<br>
    達標門檻已依時間進度調整：≥55% 達標・40–54% 預警・&lt;40% 落後<br>
    同期 YoY 基準：2025 年 5-6 月完整期
  </div>

  <div class="summary-grid" id="summaryCards"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#2E7D32"></div>達標 ≥55%（超前進度）</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E65100"></div>預警 40–54%</div>
    <div class="leg-item"><div class="leg-dot" style="background:#C62828"></div>落後 &lt;40%</div>
  </div>

  <div class="sec-hdr" id="secHdr">各業務進度</div>
  <div id="cardsContainer"></div>
</div>

<script>
const DATA = [
  { name:"謝明祥", region:"北區",
    trad:{ sale_rate:54.5, recv_rate:110.8, yoy:-46.8, ytd_yoy:9.0 },
    chain:{ sale_rate:47.2, yoy:-46.8, ytd_yoy:31.7 }
  },
  { name:"連國廷", region:"北區",
    trad:{ sale_rate:37.0, recv_rate:76.6, yoy:-59.9, ytd_yoy:-17.0 },
    chain:{ sale_rate:27.6, yoy:-69.2, ytd_yoy:0.9 }
  },
  { name:"洪裕銘", region:"北區",
    trad:{ sale_rate:49.7, recv_rate:56.2, yoy:-51.4, ytd_yoy:-4.5 },
    chain:{ sale_rate:4.1, yoy:-32.0, ytd_yoy:999 }
  },
  { name:"曾瑞真", region:"桃竹",
    trad:{ sale_rate:40.1, recv_rate:0.4, yoy:-60.8, ytd_yoy:1.9 },
    chain:{ sale_rate:46.3, yoy:-47.8, ytd_yoy:20.6 }
  },
  { name:"徐瑞廷", region:"中區",
    trad:{ sale_rate:47.7, recv_rate:47.0, yoy:-53.4, ytd_yoy:-12.2 },
    chain:{ sale_rate:49.1, yoy:-44.7, ytd_yoy:7.9 }
  },
  { name:"何星諺", region:"中區",
    trad:{ sale_rate:45.1, recv_rate:36.3, yoy:-47.3, ytd_yoy:-1.3 },
    chain:{ sale_rate:18.7, yoy:-78.9, ytd_yoy:-1.3 }
  },
  { name:"許峯閔", region:"南區",
    trad:{ sale_rate:27.0, recv_rate:74.0, yoy:-70.4, ytd_yoy:-22.2 },
    chain:{ sale_rate:25.3, yoy:-73.1, ytd_yoy:-28.1 }
  },
  { name:"陳其宏", region:"南區",
    trad:{ sale_rate:43.7, recv_rate:49.9, yoy:-34.8, ytd_yoy:-13.2 },
    chain:{ sale_rate:51.0, yoy:-43.7, ytd_yoy:27.8 }
  },
  { name:"黃翎婕", region:"南區",
    trad:{ sale_rate:28.8, recv_rate:0.0, yoy:-66.4, ytd_yoy:-19.8 },
    chain:{ sale_rate:25.0, yoy:-86.5, ytd_yoy:-16.8 }
  }
];

let currentView = 'all';

function statusClass(rate) {
  if (rate >= 55) return 'ok';
  if (rate >= 40) return 'warn';
  return 'bad';
}
function numClass(v) {
  if (v >= 0) return 'num-ok';
  if (v >= -20) return 'num-warn';
  return 'num-bad';
}
function barColor(st) { return {ok:'#2E7D32', warn:'#E65100', bad:'#C62828'}[st]; }
function fmt(v) {
  if (v === null || v === undefined) return '-';
  return (v > 0 ? '+' : '') + v.toFixed(1) + '%';
}

function getSaleRate(d) {
  if (currentView === 'chain') return d.chain.sale_rate;
  if (currentView === 'trad') return d.trad.sale_rate;
  return Math.round((d.trad.sale_rate + d.chain.sale_rate) / 2 * 10) / 10;
}

function renderSummary() {
  const sc = document.getElementById('summaryCards');
  let totSale = 0, totRecv = 0, totYoy = 0, totYtd = 0, ytdCnt = 0;
  DATA.forEach(d => {
    totSale += getSaleRate(d);
    totRecv += d.trad.recv_rate;
    totYoy += (currentView === 'chain' ? d.chain.yoy : currentView === 'trad' ? d.trad.yoy : (d.trad.yoy + d.chain.yoy) / 2);
    const ytdv = currentView === 'chain' ? (d.chain.ytd_yoy < 900 ? d.chain.ytd_yoy : null)
               : currentView === 'trad' ? d.trad.ytd_yoy
               : (d.trad.ytd_yoy + (d.chain.ytd_yoy < 900 ? d.chain.ytd_yoy : d.trad.ytd_yoy)) / 2;
    if (ytdv !== null) { totYtd += ytdv; ytdCnt++; }
  });
  const n = DATA.length;
  const avgSale = totSale / n, avgRecv = totRecv / n, avgYoy = totYoy / n, avgYtd = totYtd / ytdCnt;

  function valClass(v, hi, lo) { return v >= hi ? 'c-green' : v >= lo ? 'c-orange' : 'c-red'; }

  const recvSection = currentView === 'chain'
    ? `<div class="s-val" style="color:#bbb;font-size:18px;padding-top:4px">無收款目標</div>`
    : `<div class="s-val ${valClass(avgRecv,55,40)}">${avgRecv.toFixed(1)}%</div>`;

  sc.innerHTML = `
    <div class="s-card">
      <div class="s-lbl">5-6月 銷售達成率</div>
      <div class="s-val ${valClass(avgSale,55,40)}">${avgSale.toFixed(1)}%</div>
      <div class="s-sub">全隊平均</div>
    </div>
    <div class="s-card">
      <div class="s-lbl">傳統收款達成率</div>
      ${recvSection}
      <div class="s-sub">全隊平均</div>
    </div>
    <div class="s-card">
      <div class="s-lbl">同期 YoY</div>
      <div class="s-val ${valClass(avgYoy,0,-20)}">${fmt(avgYoy)}</div>
      <div class="s-sub">vs 2025年5-6月</div>
    </div>
    <div class="s-card">
      <div class="s-lbl">年度累計 YTD</div>
      <div class="s-val ${valClass(avgYtd,0,-10)}">${fmt(avgYtd)}</div>
      <div class="s-sub">2026 vs 2025 同期</div>
    </div>`;
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const regions = ['北區','桃竹','中區','南區'];
  let html = '';
  regions.forEach(reg => {
    const group = DATA.filter(d => d.region === reg);
    if (!group.length) return;
    html += `<div class="region-divider">${reg}</div>`;
    group.forEach(d => {
      const saleRate = getSaleRate(d);
      const st = statusClass(saleRate);
      const yoy = currentView === 'chain' ? d.chain.yoy
                : currentView === 'trad' ? d.trad.yoy
                : (d.trad.yoy + d.chain.yoy) / 2;
      const ytdRaw = currentView === 'chain' ? (d.chain.ytd_yoy >= 900 ? null : d.chain.ytd_yoy)
                   : currentView === 'trad' ? d.trad.ytd_yoy
                   : (d.trad.ytd_yoy + (d.chain.ytd_yoy < 900 ? d.chain.ytd_yoy : d.trad.ytd_yoy)) / 2;
      const ytdDisplay = ytdRaw === null ? '基期低' : fmt(ytdRaw);
      const ytdCC = ytdRaw === null ? 'num-warn' : numClass(ytdRaw);

      const pillLabel = {ok:'達標', warn:'預警', bad:'落後'}[st];

      const recvHtml = currentView !== 'chain' ? `
        <div class="prog-section">
          <div class="prog-row">
            <span class="prog-label">傳統收款達成</span>
            <span class="prog-pct ${numClass(d.trad.recv_rate - 40)}">${d.trad.recv_rate.toFixed(1)}%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${Math.min(d.trad.recv_rate,100)}%;background:${barColor(statusClass(d.trad.recv_rate))}"></div>
          </div>
        </div>` : '';

      html += `
        <div class="p-card">
          <div class="p-top">
            <div>
              <div class="p-name">${d.name}</div>
              <div class="p-region-tag">${d.region}</div>
            </div>
            <div class="pill pill-${st}">${pillLabel}</div>
          </div>
          <div class="metrics">
            <div class="m-box">
              <div class="m-num num-${st}">${saleRate.toFixed(1)}%</div>
              <div class="m-lbl">5-6月<br>銷售達成</div>
            </div>
            <div class="m-box">
              <div class="m-num ${numClass(yoy)}">${fmt(yoy)}</div>
              <div class="m-lbl">同期<br>YoY</div>
            </div>
            <div class="m-box">
              <div class="m-num ${ytdCC}">${ytdDisplay}</div>
              <div class="m-lbl">年度<br>YTD</div>
            </div>
          </div>
          ${recvHtml}
        </div>`;
    });
  });
  container.innerHTML = html;
}

function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('secHdr').textContent =
    view === 'chain' ? '連鎖通路｜各業務進度' :
    view === 'trad'  ? '傳統通路｜各業務進度' : '各業務進度';
  renderSummary();
  renderCards();
}

renderSummary();
renderCards();
</script>
</body>
</html>
