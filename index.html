<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>拉法業務週報 — 管理層</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap');

  :root {
    --red: #c0152a;
    --red-light: rgba(192,21,42,0.08);
    --red-border: rgba(192,21,42,0.2);
    --bg: #f2f2f2;
    --card: #fff;
    --border: #e4e4e4;
    --text: #111;
    --sub: #555;
    --faint: #aaa;
    --green: #1a7a42;
    --green-bg: #e8f7ef;
    --amber: #a85400;
    --amber-bg: #fff3e0;
    --bad-bg: #fff3f4;
    --blue: #1e4fbb;
    --blue-bg: #eef2ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .hdr {
    background: var(--red);
    color: #fff;
    padding: 16px 18px 14px;
  }
  .hdr-top {
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .hdr-co { font-size: 10px; letter-spacing: 2.5px; opacity: .55; text-transform: uppercase; margin-bottom: 3px; }
  .hdr-title { font-size: 18px; font-weight: 900; letter-spacing: .3px; }
  .hdr-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff; padding: 4px 8px; border-radius: 5px;
    text-align: center; margin-top: 2px;
  }
  .hdr-date input[type=date] {
    background: transparent; border: none; color: #fff;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 0; width: 110px;
  }
  .hdr-date input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .6; width: 13px; }

  /* ── PERIOD PILLS ── */
  .pbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; gap: 7px; align-items: center; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .pbar::-webkit-scrollbar { display: none; }
  .pbar-lbl { font-size: 11px; color: var(--sub); font-weight: 700; white-space: nowrap; margin-right: 2px; }
  .pbtn {
    padding: 6px 15px; border: 1.5px solid var(--border);
    background: #fff; border-radius: 20px;
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; color: var(--sub); font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .pbtn.on { background: var(--red); border-color: var(--red); color: #fff; }

  /* ── MAIN ── */
  .main { padding: 14px 14px 40px; }

  /* ── SUMMARY CARDS ── */
  .sum-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 18px;
  }
  .sum-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 13px 14px; position: relative; overflow: hidden;
    cursor: pointer; transition: border-color .15s;
  }
  .sum-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: var(--red);
  }
  .sum-card.active-card { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-border); }
  .sum-lbl { font-size: 10px; letter-spacing: 1px; color: var(--faint); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .sum-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px; font-weight: 700; line-height: 1;
  }
  .sum-val .u { font-size: 14px; font-weight: 400; color: var(--sub); }
  .sum-sub { font-size: 10.5px; color: var(--faint); margin-top: 5px; font-family: 'IBM Plex Mono', monospace; }
  .sum-na { font-size: 13px; color: var(--faint); font-style: italic; }

  /* ── CHANNEL TABS ── */
  .ch-tabs {
    display: flex; background: #fff;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 12px;
  }
  .ch-tab {
    flex: 1; padding: 11px 8px; text-align: center;
    font-size: 14px; font-weight: 700; color: var(--sub);
    cursor: pointer; border-bottom: 3px solid transparent;
    transition: all .15s;
  }
  .ch-tab.on { color: var(--red); border-bottom-color: var(--red); background: #fff9f9; }

  /* ── SUB TABS ── */
  .sub-tabs {
    display: flex; gap: 7px; margin-bottom: 13px;
  }
  .sub-tab {
    flex: 1; padding: 9px 8px; text-align: center;
    font-size: 13px; font-weight: 700; color: var(--sub);
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 8px; cursor: pointer;
  }
  .sub-tab.on { color: var(--red); border-color: var(--red); background: #fff9f9; }

  /* ── REGION HEADER ── */
  .rgn-hdr {
    font-size: 11px; font-weight: 800; letter-spacing: 2.5px;
    color: var(--red); text-transform: uppercase;
    padding: 7px 4px 5px;
  }

  /* ── REP CARD ── */
  .rep-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 9px;
    transition: border-color .15s;
  }
  .rep-card.miss { opacity: .55; }
  .rep-card:not(.miss):hover { border-color: #ccc; }

  .rep-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 11px;
  }
  .rep-name { font-size: 17px; font-weight: 800; }
  .rep-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px 14px; border-radius: 20px;
    font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 700;
  }
  .b-na   { background: #f2f2f2; color: var(--faint); font-style:italic; font-family:'Noto Sans TC',sans-serif; font-size:12px; padding: 5px 10px; }
  .b-good { background: var(--green-bg); color: var(--green); }
  .b-mid  { background: var(--amber-bg); color: var(--amber); }
  .b-bad  { background: var(--bad-bg);   color: var(--red); }

  /* Progress bar */
  .prog-wrap { margin-bottom: 12px; }
  .prog-bg {
    height: 8px; background: #ebebeb; border-radius: 99px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* Numbers row */
  .rep-nums {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 0;
  }
  .rep-num-block {}
  .rep-num-lbl {
    font-size: 10px; color: var(--faint); font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase; margin-bottom: 3px;
  }
  .rep-num-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 19px; font-weight: 700; color: var(--text);
  }
  .rep-num-val.act-val { color: var(--red); }
  .rep-num-val.na-val { color: var(--faint); font-size: 15px; font-style: italic; font-family: 'Noto Sans TC', sans-serif; }

  /* Input for editable fields */
  .num-input {
    font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 700;
    color: var(--red); background: transparent; border: none;
    border-bottom: 2px dashed var(--red-border); width: 100%;
    padding: 0 0 2px; outline: none;
    -webkit-appearance: none;
  }
  .num-input::placeholder { color: var(--faint); font-style: italic; font-weight: 400; font-size: 14px; }
  .num-input:focus { border-bottom-color: var(--red); }

  /* YTD section (collapsible) */
  .ytd-toggle {
    margin-top: 10px; padding-top: 9px;
    border-top: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-size: 11px; color: var(--faint); font-weight: 600;
    letter-spacing: .5px;
  }
  .ytd-toggle .arr { transition: transform .2s; font-size: 10px; }
  .ytd-toggle.open .arr { transform: rotate(180deg); }
  .ytd-body {
    display: none; padding-top: 10px;
  }
  .ytd-body.open { display: block; }
  .ytd-nums {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .ytd-num-lbl { font-size: 10px; color: var(--faint); font-weight: 700; letter-spacing: .5px; margin-bottom: 3px; }
  .ytd-num-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px; font-weight: 700;
  }
  .ytd-26 { color: var(--blue); }
  .ytd-25 { color: #999; }
  .yoy { font-size: 15px; font-weight: 700; }
  .yu { color: var(--green); }
  .yd { color: var(--red); }
  .yf { color: var(--faint); }

  /* ── TOTAL CARD ── */
  .tot-card {
    background: #f5f5f5; border: 2px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-top: 4px;
  }
  .tot-card .rep-name { color: var(--sub); font-size: 14px; letter-spacing: 1px; }

  /* ── LEGEND ── */
  .legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 16px; padding: 10px 4px 0;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--sub);
  }
  .leg-i { display: flex; align-items: center; gap: 5px; }
  .leg-d { width: 8px; height: 8px; border-radius: 50%; }

  /* ── SAVE BAR ── */
  .savebar {
    text-align: center; font-size: 11px; color: var(--faint);
    font-family: 'IBM Plex Mono', monospace;
    padding: 8px 14px 4px;
  }
  .savebar span { color: var(--red); }
  .savebar a { color: var(--faint); }
</style>
</head>

const fN = n => (n===null||n===undefined||n===''||isNaN(Number(n))) ? '—' : Math.round(Number(n)).toLocaleString('zh-TW');
const aSum = (arr,n) => arr.slice(0,n).reduce((a,b)=>a+b,0);
const rKey = r => r.miss ? r.region+'缺區' : r.name;

function badgeCls(actual, target) {
  if (!target || actual===null || actual==='') return 'b-na';
  const r=Number(actual)/target;
  return r>=0.4?'b-good':r>=0.2?'b-mid':'b-bad';
}
function badgeTxt(actual, target) {
  if (!target || actual===null || actual==='') return '—';
  return (Number(actual)/target*100).toFixed(1)+'%';
}
function progColor(actual, target) {
  if (!target || actual===null || actual==='') return '#ddd';
  const r=Number(actual)/target;
  return r>=0.4?'#1a7a42':r>=0.2?'#f0a000':'#c0152a';
}
function progW(actual, target) {
  if (!target || actual===null || actual==='') return 0;
  return Math.min(100, Number(actual)/target*100);
}

// ── RENDER CARDS ──────────────────────────────────────
function renderCards(cid, type, stored) {
  const pd = PERIODS[curP];
  const targets = pd[type]?.targets || {};
  const mtype = NS_TYPE[type];
  const hasYtd = !!mtype;
  const N = pd.ytdN;

  let html = '';
  let lastR='', totTgt=0, totAct=0, totY26=0, totY25=0;

  ROSTER.forEach(rep => {
    const k = rKey(rep);
    const sv = stored[`${type}_${k}`];
    const seed = (SEEDS[type]||{})[k];
    let actual = (sv!==undefined && sv!=='') ? sv : (seed!==undefined ? seed : '');
    const target = targets[rep.name] || null;
    const md = mtype && MONTHLY[mtype]?.[k];
    const y26 = md ? aSum(md.m26, N) : null;
    const y25 = md ? aSum(md.m25, N) : null;

    if (rep.region !== lastR) {
      html += `<div class="rgn-hdr">${rep.region}</div>`;
      lastR = rep.region;
    }

    const bCls = badgeCls(actual, target);
    const bTxt = badgeTxt(actual, target);
    const pw = progW(actual, target);
    const pc = progColor(actual, target);

    const actField = rep.miss
      ? `<div class="rep-num-val ${actual!==''?'act-val':'na-val'}">${actual!==''?fN(actual):'—'}</div>`
      : `<input class="num-input" type="text" inputmode="numeric" placeholder="輸入累計"
           value="${actual!==''?actual:''}" data-key="${type}_${k}"
           onchange="handleInput(this)" onfocus="this.select()">`;

    let ytdHtml = '';
    if (hasYtd) {
      const yoyTxt = (!y26||!y25) ? '—' : ((y26-y25)/y25>=0?'+':'')+((y26-y25)/y25*100).toFixed(1)+'%';
      const yoyCls = (!y26||!y25)?'yf':((y26-y25)/y25>0.02?'yu':(y26-y25)/y25<-0.02?'yd':'yf');
      ytdHtml = `
        <div class="ytd-toggle" onclick="toggleYtd(this)">
          <span>年度累計（1–${N}月）</span><span class="arr">▼</span>
        </div>
        <div class="ytd-body">
          <div class="ytd-nums">
            <div>
              <div class="ytd-num-lbl">2026</div>
              <div class="ytd-num-val ytd-26">${y26!==null?fN(y26):'—'}</div>
            </div>
            <div>
              <div class="ytd-num-lbl">2025</div>
              <div class="ytd-num-val ytd-25">${y25!==null?fN(y25):'—'}</div>
            </div>
            <div>
              <div class="ytd-num-lbl">YoY</div>
              <div class="ytd-num-val yoy ${yoyCls}">${yoyTxt}</div>
            </div>
          </div>
        </div>`;
    }

    html += `
    <div class="rep-card${rep.miss?' miss':''}">
      <div class="rep-top">
        <div class="rep-name">${rep.name}</div>
        <div class="rep-badge ${bCls}">${bTxt}</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bg">
          <div class="prog-fill" style="width:${pw}%;background:${pc}"></div>
        </div>
      </div>
      <div class="rep-nums">
        <div class="rep-num-block">
          <div class="rep-num-lbl">目標</div>
          <div class="rep-num-val">${target?fN(target):'—'}</div>
        </div>
        <div class="rep-num-block">
          <div class="rep-num-lbl">累計</div>
          ${actField}
        </div>
      </div>
      ${ytdHtml}
    </div>`;

    if (target) totTgt += target;
    if (actual!==''&&!isNaN(Number(actual))) totAct += Number(actual);
    if (y26) totY26 += y26;
    if (y25) totY25 += y25;
  });

  // Total card
  const tbCls = badgeCls(totAct, totTgt);
  const tbTxt = badgeTxt(totAct, totTgt);
  const tpw = progW(totAct, totTgt);
  const tpc = progColor(totAct, totTgt);

  let totYtd = '';
  if (hasYtd) {
    const yoyTxt = (!totY26||!totY25)?'—':((totY26-totY25)/totY25>=0?'+':'')+((totY26-totY25)/totY25*100).toFixed(1)+'%';
    const yoyCls = (!totY26||!totY25)?'yf':((totY26-totY25)/totY25>0.02?'yu':(totY26-totY25)/totY25<-0.02?'yd':'yf');
    totYtd = `
      <div style="margin-top:10px;padding-top:9px;border-top:1px dashed var(--border)">
        <div class="ytd-nums">
          <div><div class="ytd-num-lbl">2026累計</div><div class="ytd-num-val ytd-26">${fN(totY26)}</div></div>
          <div><div class="ytd-num-lbl">2025同期</div><div class="ytd-num-val ytd-25">${fN(totY25)}</div></div>
          <div><div class="ytd-num-lbl">YoY</div><div class="ytd-num-val yoy ${yoyCls}">${yoyTxt}</div></div>
        </div>
      </div>`;
  }

  html += `
  <div class="tot-card">
    <div class="rep-top">
      <div class="rep-name" style="font-size:14px;letter-spacing:1.5px;color:var(--sub)">合 計</div>
      <div class="rep-badge ${tbCls}">${tbTxt}</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill" style="width:${tpw}%;background:${tpc}"></div></div>
    </div>
    <div class="rep-nums">
      <div class="rep-num-block">
        <div class="rep-num-lbl">總目標</div>
        <div class="rep-num-val">${fN(totTgt)}</div>
      </div>
      <div class="rep-num-block">
        <div class="rep-num-lbl">總累計</div>
        <div class="rep-num-val act-val">${fN(totAct)}</div>
      </div>
    </div>
    ${totYtd}
  </div>`;

  // Legend
  const leg = document.getElementById('leg-'+cid.replace('cards-',''));
  if (leg) leg.innerHTML = `
    <div class="leg-i"><div class="leg-d" style="background:var(--green)"></div>達成率 ≥ 40%</div>
    <div class="leg-i"><div class="leg-d" style="background:#f0a000"></div>20–39%</div>
    <div class="leg-i"><div class="leg-d" style="background:var(--red)"></div>&lt; 20%</div>
    <div style="width:100%;font-size:10px;color:var(--faint);margin-top:2px">缺區不計目標</div>`;

  document.getElementById(cid).innerHTML = html;

  return { tgt:totTgt, act:totAct, rate:totTgt>0&&totAct>0?totAct/totTgt:null };
}

// ── YTD TOGGLE ────────────────────────────────────────
function toggleYtd(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ── CARDS ─────────────────────────────────────────────
function updateCard(vid, sid, rate, tgt, act) {
  const el = document.getElementById(vid), sub = document.getElementById(sid);
  if (rate===null) { el.innerHTML='<span class="sum-na">待輸入</span>'; sub.textContent=''; return; }
  const pct = (rate*100).toFixed(1);
  const col = rate>=0.4?'var(--green)':rate>=0.2?'var(--amber)':'var(--red)';
  el.innerHTML = `<span style="color:${col}">${pct}<span class="u">%</span></span>`;
  sub.textContent = `目標 ${fN(tgt)} 累計 ${fN(act)}`;
}

// ── RENDER ALL ────────────────────────────────────────
function renderAll() {
  const s = loadS();
  const r0 = renderCards('cards-trad-ns',    'tradNs',   s);
  const r1 = renderCards('cards-chain-ns',   'chainNs',  s);
  const r2 = renderCards('cards-trad-coll',  'tradColl', s);
  const r3 = renderCards('cards-chain-coll', 'chainColl',s);
  updateCard('c0','c0s',r0.rate,r0.tgt,r0.act);
  updateCard('c1','c1s',r1.rate,r1.tgt,r1.act);
  updateCard('c2','c2s',r2.rate,r2.tgt,r2.act);
  updateCard('c3','c3s',r3.rate,r3.tgt,r3.act);
}

// ── INPUT ─────────────────────────────────────────────
function handleInput(el) {
  const raw = el.value.replace(/,/g,'').trim();
  const num = parseFloat(raw);
  if (raw===''||isNaN(num)) { el.value=''; saveV(el.dataset.key,''); }
  else { el.value=Math.round(num); saveV(el.dataset.key,Math.round(num)); }
  renderAll();
}

// ── TAB SWITCHING ─────────────────────────────────────
function switchChannel(ch, btn) {
  curChannel = ch;
  document.querySelectorAll('.ch-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('ch-trad').style.display  = ch==='trad'  ? '' : 'none';
  document.getElementById('ch-chain').style.display = ch==='chain' ? '' : 'none';
  updateCardHighlight();
}

function switchSub(ch, sub, btn) {
  curSub[ch] = sub;
  document.querySelectorAll(`#ch-${ch} .sub-tab`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll(`#ch-${ch} .pane`).forEach(p=>p.classList.remove('on'));
  document.getElementById(`p-${ch}-${sub}`).classList.add('on');
  updateCardHighlight();
}

function jumpTo(ch, sub) {
  const l1btn = document.getElementById(`l1-${ch}`);
  switchChannel(ch, l1btn);
  const l2btn = document.getElementById(`l2-${ch}-${sub}`);
  switchSub(ch, sub, l2btn);
  document.querySelector('.ch-tabs').scrollIntoView({behavior:'smooth', block:'start'});
}

function updateCardHighlight() {
  const map = {
    'trad-ns':'card-trad-ns','trad-coll':'card-trad-coll',
    'chain-ns':'card-chain-ns','chain-coll':'card-chain-coll',
  };
  const active = `${curChannel}-${curSub[curChannel]}`;
  Object.values(map).forEach(id=>document.getElementById(id).classList.remove('active-card'));
  document.getElementById(map[active])?.classList.add('active-card');
}

function setPeriod(btn, p) {
  curP = p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('savedTime').textContent = '尚未儲存';
  renderAll();
}

function clearAll(e) {
  e.preventDefault();
  if (!confirm(`確定清除「${PERIODS[curP].label}」手動輸入數據？`)) return;
  localStorage.removeItem(sKey());
  document.getElementById('savedTime').textContent = '尚未儲存';
  renderAll();
}

// ── INIT ──────────────────────────────────────────────
document.getElementById('rptDate').value = new Date().toISOString().slice(0,10);
renderAll();
</script>
</body>
</html>
